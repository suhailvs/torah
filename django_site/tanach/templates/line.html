{% load torah_filters %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

  <body>
    <div class="container"> 
      <br>
      <div class="card">
        <div class="card-header"> {{current.book}} - {{current.chapter}}:{{current.line}} ({{lineno}})</div>  
        <div class="card-body">
          <table class="table table-bordered">
          <tr>{% for w in words %}<td>{{w}}</td>{% endfor %}</tr>
          <tr>{% for w in en_words %}<td>{{w}}</td>{% endfor %}</tr>
          <tr><td colspan="{{total_words}}">{{en_lines}}</td></tr>
          </table>
          
        </div>

        <div class="card-footer">
          
              <a class="btn btn-secondary" href="/{{current.book}}/{{current.chapter}}/{{current.line |add:"-1"}}/">&lt;- prev</a> 
              <a class="btn btn-secondary" href="/{{current.book}}/{{current.chapter}}/{{current.line |add:"1"}}/">next -&gt;</a>
              
        </div>

      </div> 
    </div> 
  </body>
 </html>
