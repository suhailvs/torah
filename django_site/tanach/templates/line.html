{% load torah_filters %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

  <body>
    <div class="container"> 
      <div class="card">
        <div class="card-header"> {{current.book}} - {{current.chapter}}:{{current.line}} </div>  
        <ul class="list-group list-group-flush">
          {% for word in words %}
          <li class="list-group-item">{{word.token}}:{{word.meaning}}</li>
          {% endfor %}
          <li class="list-group-item text-right"> 
            <a class="btn btn-default btn-sm" href="/{{current.book}}/{{current.chapter}}/{{current.line |add:"-1"}}/">&lt;- prev</a> 
            <a class="btn btn-default btn-sm" href="/{{current.book}}/{{current.chapter}}/{{current.line |add:"1"}}/">next -&gt;</a>
          </li> 
        </ul>
      </div> 
    </div> 
  </body>
 </html>
