{% extends "tanach/base.html" %}
{% load torah_filters %}
{% block body %}
<table class="table table-bordered">
	<tr><th>Similar Words</th><th>Translation</th><th>Position</th></tr>
	{% for w in words %}
	<tr><td>{{w.token}}</td><td>{{w.meaning}}</td><td>({{w.book}}:{{w.line}}:{{w.position}})</td></tr>
	{% endfor %}
</table>
{% endblock %}
